# TPT Banking Platform — Casbin RBAC Model
#
# This model defines role-based access control with role inheritance.
# Roles are hierarchical: higher roles inherit all permissions of lower roles.
#
# Roles (ascending privilege):
#   retail_customer       → own account read/write
#   preferred_customer    → retail + enhanced rate access
#   hnw_client            → preferred + private banking access
#   vip_client            → hnw + family office access
#   relationship_manager  → client management + CRM
#   teller                → branch operations (deposits, withdrawals)
#   compliance_officer    → AML/KYC/SAR — isolated from trading
#   trader                → trading desk operations
#   admin                 → user management + configuration
#   super_admin           → all permissions

[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = g(r.sub, p.sub) && r.obj == p.obj && r.act == p.act
