global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: banking-core
    static_configs:
      - targets: ['host.docker.internal:9464']
    relabel_configs:
      - target_label: service
        replacement: banking-core

