apiVersion: v1
kind: Service
metadata:
  name: banking-core
  namespace: tpt-banking
  labels:
    app: banking-core
spec:
  selector:
    app: banking-core
  ports:
    - name: http
      port: 3000
      targetPort: 3000
    - name: metrics
      port: 9464
      targetPort: 9464
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-core
  namespace: tpt-banking
  labels:
    app: banking-core
    app.kubernetes.io/component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: banking-core
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: banking-core
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9464"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: banking-core
                topologyKey: kubernetes.io/hostname
      containers:
        - name: banking-core
          image: tpt-banking/banking-core:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
            - containerPort: 9464
          envFrom:
            - configMapRef:
                name: tpt-banking-config
            - secretRef:
                name: tpt-banking-secrets
          env:
            - name: PORT
              value: "3000"
            - name: PROMETHEUS_PORT
              value: "9464"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      terminationGracePeriodSeconds: 60
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: banking-core
  namespace: tpt-banking
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: banking-core
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
