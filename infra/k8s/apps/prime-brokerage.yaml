apiVersion: v1
kind: Service
metadata:
  name: prime-brokerage
  namespace: tpt-banking
  labels:
    app: prime-brokerage
spec:
  selector:
    app: prime-brokerage
  ports:
    - name: http
      port: 3010
      targetPort: 3010
    - name: metrics
      port: 9474
      targetPort: 9474
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prime-brokerage
  namespace: tpt-banking
  labels:
    app: prime-brokerage
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prime-brokerage
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: prime-brokerage
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9474"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: prime-brokerage
                topologyKey: kubernetes.io/hostname
      containers:
        - name: prime-brokerage
          image: tpt-banking/prime-brokerage:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3010
            - containerPort: 9474
          envFrom:
            - configMapRef:
                name: tpt-banking-config
            - secretRef:
                name: tpt-banking-secrets
          env:
            - name: PORT
              value: "3010"
            - name: PROMETHEUS_PORT
              value: "9474"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 3010
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 3010
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      terminationGracePeriodSeconds: 60
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: prime-brokerage
  namespace: tpt-banking
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: prime-brokerage
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
