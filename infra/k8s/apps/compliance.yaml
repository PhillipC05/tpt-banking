apiVersion: v1
kind: Service
metadata:
  name: compliance
  namespace: tpt-banking
  labels:
    app: compliance
spec:
  selector:
    app: compliance
  ports:
    - name: http
      port: 3002
      targetPort: 3002
    - name: metrics
      port: 9466
      targetPort: 9466
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: compliance
  namespace: tpt-banking
  labels:
    app: compliance
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: compliance
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: compliance
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9466"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: compliance
                topologyKey: kubernetes.io/hostname
      containers:
        - name: compliance
          image: tpt-banking/compliance:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
            - containerPort: 9466
          envFrom:
            - configMapRef:
                name: tpt-banking-config
            - secretRef:
                name: tpt-banking-secrets
          env:
            - name: PORT
              value: "3002"
            - name: PROMETHEUS_PORT
              value: "9466"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      terminationGracePeriodSeconds: 60
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: compliance
  namespace: tpt-banking
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: compliance
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
