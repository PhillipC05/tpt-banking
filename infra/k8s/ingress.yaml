apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tpt-banking-ingress
  namespace: tpt-banking
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "Strict-Transport-Security: max-age=63072000; includeSubDomains; preload";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "Referrer-Policy: no-referrer";
      more_set_headers "Permissions-Policy: geolocation=(), microphone=(), camera=()";
    # cert-manager annotation — replace with your ClusterIssuer name
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.tptbanking.com
      secretName: tpt-banking-tls
  rules:
    # All external traffic routes through the API gateway
    - host: api.tptbanking.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3001
    # Open Banking has its own subdomain (FAPI requirement)
    - host: openbanking.tptbanking.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: open-banking
                port:
                  number: 3003
